<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web MPSAMP</title>
    <style>
        /* Pengaturan Dasar */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Mencegah scrollbar double luar */
        }

        /* --- EFEK BULAN SABIT MERAH MENYALA (CUMA DI HOME) --- */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            color: #ff0000;
            font-size: 28px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #b30000;
            animation: float 6s infinite alternate ease-in-out;
            user-select: none;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(0.8); opacity: 0.2; }
            50% { opacity: 1; }
            100% { transform: translateY(-40px) scale(1.1); opacity: 0.1; }
        }

        /* --- TOMBOL HAMBURGER (KIRI ATAS) --- */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            transition: 0.3s;
        }
        .menu-btn:hover {
            color: red;
            text-shadow: 0 0 10px red;
        }

        /* --- TOMBOL LOGIN / SUDAH LOGIN (KANAN ATAS) --- */
        .login-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: transparent;
            border: 2px solid red;
            color: #fff;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }
        .login-btn:hover {
            background: red;
            box-shadow: 0 0 20px red;
        }

        /* --- TOMBOL KONTROL MUSIK (DI ATAS BAR CHAT & GAK NIMPA) --- */
        .music-control {
            position: fixed;
            bottom: 135px; 
            right: 35px; 
            background: #111;
            border: 2px solid red;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 105; 
            box-shadow: 0 0 15px red;
            font-size: 18px;
            transition: 0.3s;
            user-select: none;
        }
        .music-control:hover {
            transform: scale(1.1);
        }

        /* --- POPUP MODAL LOGIN & LUPA PASSWORD --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: #111;
            border: 2px solid red;
            border-radius: 20px;
            width: 320px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px red;
            position: relative;
            color: red;
        }
        .login-logo {
            font-size: 50px;
            color: red;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px red);
        }
        .modal-card input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid red;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }
        .modal-card input:focus {
            box-shadow: 0 0 10px red;
        }
        .modal-card button {
            background: red;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .modal-card button:hover {
            background: #b30000;
            box-shadow: 0 0 15px red;
        }

        /* --- SIDEBAR DISCORD STYLE --- */
        .sidebar {
            position: fixed;
            top: 0; left: -100px; width: 80px; height: 100vh;
            background-color: #1e1f22;
            transition: 0.4s ease;
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar.active {
            left: 0;
        }
        .nav-item {
            width: 50px; height: 50px;
            background-color: #313338;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
            font-weight: bold; font-size: 16px;
            position: relative; user-select: none;
            color: #fff;
        }
        
        /* WARNA SLIDE AKTIF MERAH NEON */
        .nav-item:hover, .nav-item.active-menu {
            border-radius: 30%;
            background-color: red !important;
            box-shadow: 0 0 15px red;
        }
        .huruf-j-merah {
            color: red;
            font-size: 22px;
            text-shadow: 0 0 10px red, 0 0 20px red;
        }

        /* --- KONTEN SLIDE --- */
        .content-section {
            display: none;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
        }
        .content-section.active {
            display: flex;
            flex-direction: column;
        }

        /* --- CHAT BOX RENTANG PENUH --- */
        .chat-container {
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 2;
        }
        .chat-header {
            background: #111;
            color: red;
            padding: 18px 20px 18px 70px; 
            font-weight: bold;
            border-bottom: 2px solid red;
            text-align: left;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }
        .msg {
            background: #141414;
            padding: 12px 18px;
            border-radius: 12px;
            max-width: 65%;
            font-size: 14.5px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            word-wrap: break-word;
        }
        
        /* --- INPUT CHAT ATASAN SEDIKIT (MARGIN BAWAH 55px) --- */
        .chat-input-area {
            display: flex;
            border: 2px solid red;
            border-radius: 25px; 
            background: #000;
            margin: 10px 20px 55px 20px; 
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: #fff;
            outline: none;
            font-size: 15px;
        }
        .chat-input-area button {
            background: red;
            color: white;
            border: none;
            padding: 0 35px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
        }
        .chat-input-area button:hover {
            background: #b30000;
        }

        /* Slide J (Pure Hitam Kosong) */
        #slide-j {
            background-color: #000;
        }

    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="http://sampplay.my.id/play/TAMU_MALAM_MINGGU_Tasya_R_1781246493.mp3" type="audio/mpeg">
    </audio>

    <div id="particles-container"></div>

    <div class="menu-btn" onclick="toggleSidebar()">&#9776;</div>

    <div class="music-control" id="musicBtn" onclick="toggleMusic()">🎵</div>

    <button class="login-btn" id="loginButton" onclick="toggleModal(true)">Login</button>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="login-logo" id="modalIcon">👤</div>
            <h3 id="modalTitle">USER LOGIN</h3>
            
            <input type="text" placeholder="Username" id="userIn" required>
            <input type="password" placeholder="Password" id="passIn" required>
            <input type="text" placeholder="PIN Pemulihan (4 Angka)" id="pinIn" maxlength="4" required>
            <input type="password" placeholder="Password Baru" id="newPassIn" style="display:none;" required>
            
            <br>
            <button id="modalBtn" onclick="submitAuth()">Lanjut</button>
            
            <div style="margin-top: 20px;">
                <a href="#" id="forgotLink" onclick="toggleForgotMode(true)" style="color: #888; font-size: 13px; text-decoration: none; font-weight: bold; transition: 0.2s;">Lupa Password?</a>
            </div>
        </div>
    </div>

    <div class="sidebar" id="mySidebar">
        <div class="nav-item active-menu" data-tooltip="Home" onclick="openSlide('home')">H</div>
        <div class="nav-item huruf-j-merah" data-tooltip="Slide J" onclick="openSlide('slide-j')">J</div>
    </div>

    <div id="home" class="content-section active">
        <div class="chat-container">
            <div class="chat-header">💬 Message Group Real-Time</div>
            <div class="chat-messages" id="chatBox"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ketik pesan di sini..." onkeypress="handleChatEnter(event)">
                <button onclick="sendChat()">Kirim</button>
            </div>
        </div>
    </div>

    <div id="slide-j" class="content-section"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ047WPwkQLp4wrSrh_MXCuzIoheBxwoc",
            authDomain: "mprl-98aa0.firebaseapp.com",
            projectId: "mprl-98aa0",
            storageBucket: "mprl-98aa0.appspot.com",
            messagingSenderId: "503738439184",
            appId: "1:503738439184:web:b05173ce45253442599c95"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "grup_chat");

        // Variabel Global
        window.globalUsername = "Guest"; 
        window.isForgotMode = false;

        // 1. Fungsi Sidebar
        window.toggleSidebar = function() {
            document.getElementById("mySidebar").classList.toggle("active");
        }

        // 2. Fungsi Popup Modal
        window.toggleModal = function(show) {
            document.getElementById("loginModal").style.display = show ? "flex" : "none";
            if(show) window.toggleForgotMode(false); 
        }

        window.toggleForgotMode = function(show) {
            window.isForgotMode = show;
            const title = document.getElementById("modalTitle");
            const icon = document.getElementById("modalIcon");
            const userIn = document.getElementById("userIn");
            const passIn = document.getElementById("passIn");
            const pinIn = document.getElementById("pinIn");
            const newPassIn = document.getElementById("newPassIn");
            const btn = document.getElementById("modalBtn");
            const forgotLink = document.getElementById("forgotLink");

            if (show) {
                title.innerText = "RESET PASSWORD";
                icon.innerText = "🔑";
                userIn.style.display = "none";
                passIn.style.display = "none";
                newPassIn.style.display = "block";
                pinIn.placeholder = "Masukkan PIN Rahasia Anda";
                btn.innerText = "Simpan Sandi Baru";
                forgotLink.innerText = "Kembali ke Login";
                forgotLink.setAttribute("onclick", "toggleForgotMode(false)");
            } else {
                title.innerText = "USER LOGIN";
                icon.innerText = "👤";
                userIn.style.display = "block";
                passIn.style.display = "block";
                newPassIn.style.display = "none";
                pinIn.placeholder = "PIN Pemulihan (4 Angka)";
                btn.innerText = "Lanjut";
                forgotLink.innerText = "Lupa Password?";
                forgotLink.setAttribute("onclick", "toggleForgotMode(true)");
            }
        }

        window.submitAuth = function() {
            const pin = document.getElementById("pinIn").value.trim();
            if (pin === "") { alert("PIN Rahasia WAJIB diisi, bro!"); return; }

            const savedUser = localStorage.getItem("mpsamp_user");
            const savedPass = localStorage.getItem("mpsamp_pass");
            const savedPin = localStorage.getItem("mpsamp_pin");

            if (window.isForgotMode) {
                const newPass = document.getElementById("newPassIn").value.trim();
                if (newPass === "") { alert("Password baru jangan dikosongin bro!"); return; }
                if (pin === savedPin) {
                    localStorage.setItem("mpsamp_pass", newPass);
                    alert("Password sukses diganti!");
                    window.toggleForgotMode(false); 
                } else {
                    alert("Gagal Reset! PIN Rahasia salah!");
                }
            } else {
                const u = document.getElementById("userIn").value.trim();
                const p = document.getElementById("passIn").value.trim();
                if (u === "" || p === "") { alert("Username dan Password WAJIB diisi bro!"); return; }

                if (!savedUser) {
                    localStorage.setItem("mpsamp_user", u);
                    localStorage.setItem("mpsamp_pass", p);
                    localStorage.setItem("mpsamp_pin", pin); 
                    window.globalUsername = u;
                    alert("Akun sukses dibuat!");
                } else {
                    if (u === savedUser && p === savedPass) {
                        window.globalUsername = u;
                        alert("Login Berhasil!");
                    } else {
                        alert("Gagal Login! Password / Username salah.");
                        return; 
                    }
                }
                window.toggleModal(false); 
                document.getElementById("loginButton").innerText = `(${window.globalUsername})`; 
                window.playMusic();
            }
        }

        window.openSlide = function(slideId) {
            let sections = document.getElementsByClassName("content-section");
            for (let i = 0; i < sections.length; i++) { sections[i].classList.remove("active"); }
            document.getElementById(slideId).classList.add("active");
            
            const particles = document.getElementById('particles-container');
            particles.style.display = (slideId === 'home') ? 'block' : 'none';

            let navItems = document.getElementsByClassName("nav-item");
            for (let i = 0; i < navItems.length; i++) { navItems[i].classList.remove("active-menu"); }
            event.currentTarget.classList.add("active-menu");
        }

        window.createParticles = function() {
            const container = document.getElementById('particles-container');
            container.innerHTML = ""; 
            for (let i = 0; i < 20; i++) {
                let particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = '🌙'; 
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                container.appendChild(particle);
            }
        }
        window.createParticles(); // Memanggil fungsi partikel saat web dimuat

        // 3. Fungsi Musik
        window.playMusic = function() {
            document.getElementById("myAudio").play().catch(e => console.log("Menunggu aksi user"));
        }

        window.toggleMusic = function() {
            const audio = document.getElementById("myAudio");
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // 4. LOGIKA FIREBASE CHAT
        window.sendChat = function() {
            const input = document.getElementById("chatInput");
            const pesan = input.value.trim();
            
            if (pesan === "") return; 
            
            push(chatRef, {
                pengirim: window.globalUsername,
                teks: pesan,
                waktu: Date.now()
            });
            
            input.value = ""; 
        }

        window.handleChatEnter = function(event) {
            if (event.key === "Enter") {
                window.sendChat();
            }
        }

        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById("chatBox");
            const msgDiv = document.createElement("div");
            
            // Cek jika pesan ini dikirim oleh diri sendiri (agar warnanya beda)
            const isMe = data.pengirim === window.globalUsername;
            const namaColor = isMe ? "#ff4d4d" : "#00ffcc";
            
            msgDiv.className = "msg";
            // Jika dikirim oleh diri sendiri, pesan berada di kanan
            if (isMe) {
                msgDiv.style.alignSelf = "flex-end";
                msgDiv.style.backgroundColor = "#240000"; // Warna background agak kemerahan
            }

            msgDiv.innerHTML = `<strong style="color: ${namaColor};">${data.pengirim}:</strong> <br> ${data.teks}`;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

    </script>
</body>
</html>
